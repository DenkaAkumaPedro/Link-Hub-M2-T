kind = "web"
previewPath = "/"
title = "Pedro — Links"
version = "1.0.0"
id = "artifacts/links"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24663

[services.development]
run = "pnpm --filter @workspace/links run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/links", "run", "build" ]
publicDir = "artifacts/links/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24663"
BASE_PATH = "/"
