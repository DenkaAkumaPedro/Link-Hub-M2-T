name: Build and update docs/ for GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "artifacts/links/**"
      - ".github/workflows/deploy-links.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: VITE_BASE_PATH="./" pnpm --filter @workspace/links run build:gh-pages

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: rebuild docs/ for GitHub Pages"
          git push
